name: Codespell Check

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  codespell:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Install codespell
        run: |
          pip install codespell

      - name: Run codespell
        run: |
          codespell --config .codespellrc
