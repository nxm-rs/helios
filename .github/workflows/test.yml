name: test

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

env:
  MAINNET_EXECUTION_RPC: ${{ secrets.MAINNET_EXECUTION_RPC }}
  SEPOLIA_EXECUTION_RPC: ${{ secrets.SEPOLIA_EXECUTION_RPC }}

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Check version consistency
        run: bash ./scripts/check-version-consistency.sh

  check:
    runs-on: ubuntu-latest
    needs: version-check
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af  # v1
        with:
          profile: minimal
          toolchain: stable
          override: true
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2.9.1
      - uses: actions-rs/cargo@844f36862e911db73fe0815f00a4a2602c279505  # v1
        with:
          command: check

  test:
    runs-on: ubuntu-latest
    needs: version-check
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af  # v1
        with:
          profile: minimal
          toolchain: stable
          override: true
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2.9.1
      - name: Install libfont
        run: sudo apt install libfontconfig libfontconfig1-dev
      - uses: actions-rs/cargo@844f36862e911db73fe0815f00a4a2602c279505  # v1
        with:
          command: test
          args: --all

  fmt:
    runs-on: ubuntu-latest
    needs: version-check
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af  # v1
        with:
          profile: minimal
          toolchain: stable
          override: true
          components: rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2.9.1
      - uses: actions-rs/cargo@844f36862e911db73fe0815f00a4a2602c279505  # v1
        with:
          command: fmt
          args: --all -- --check

  clippy:
    runs-on: ubuntu-latest
    needs: version-check
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af  # v1
        with:
          profile: minimal
          toolchain: stable
          override: true
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2.9.1
      - uses: actions-rs/cargo@844f36862e911db73fe0815f00a4a2602c279505  # v1
        with:
          command: clippy
          args: --all -- -D warnings
  wasm-compatibility:
    runs-on: ubuntu-latest
    needs: version-check
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af  # v1
        with:
          profile: minimal
          toolchain: stable
          override: true
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2.9.1
      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown
      - name: Check wasm compatibility
        uses: actions-rs/cargo@844f36862e911db73fe0815f00a4a2602c279505  # v1
        with:
          command: check
          args: --target wasm32-unknown-unknown --package helios-ts
